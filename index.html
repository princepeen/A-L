<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>For You — A Small Gift</title>
<meta name="description" content="A little countdown, and a letter waiting on the other side.">
<meta name="theme-color" content="#FAF3E8">

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="grain"></div>
<div class="petals" id="petals" aria-hidden="true"></div>

<main class="stage">

  <!-- ===================== COUNTDOWN VIEW ===================== -->
  <section class="view view--countdown" id="countdownView">

    <p class="eyebrow">something is waiting for you</p>

    <h1 class="date-mark">
      <span class="date-line">11<span class="dot">·</span>07<span class="dot">·</span>2026</span>
    </h1>
    <p class="time-mark">3:30&nbsp;PM&nbsp;IST</p>

    <div class="countdown" id="countdown" role="timer" aria-live="polite">
      <div class="cd-unit">
        <span class="cd-num" id="cdDays">00</span>
        <span class="cd-label">days</span>
      </div>
      <span class="cd-sep">·</span>
      <div class="cd-unit">
        <span class="cd-num" id="cdHours">00</span>
        <span class="cd-label">hours</span>
      </div>
      <span class="cd-sep">·</span>
      <div class="cd-unit">
        <span class="cd-num" id="cdMinutes">00</span>
        <span class="cd-label">minutes</span>
      </div>
      <span class="cd-sep">·</span>
      <div class="cd-unit">
        <span class="cd-num" id="cdSeconds">00</span>
        <span class="cd-label">seconds</span>
      </div>
    </div>

    <p class="hint">the envelope opens itself, when the time is right</p>
  </section>

  <!-- ===================== ENVELOPE VIEW ===================== -->
  <section class="view view--envelope" id="envelopeView" hidden>

    <p class="eyebrow">it's time</p>

    <button class="envelope" id="envelopeButton" aria-label="Open the envelope" aria-expanded="false">
      <span class="envelope__shadow"></span>
      <span class="envelope__body">
        <span class="envelope__flap"></span>
        <span class="envelope__paper" id="envelopePaper">
          <span class="paper__text">
            My love,<br><br>
            there's something I've been waiting to give you —
            it's just been waiting for today.<br><br>
            Open it, when you're ready.
          </span>
          <span class="paper__cta">
            <span class="cta-button" id="openLetterBtn" role="button" tabindex="0">Open My Letter</span>
          </span>
        </span>
        <span class="envelope__seal" id="envelopeSeal">
          <svg viewBox="0 0 100 100" width="100%" height="100%" aria-hidden="true">
            <circle cx="50" cy="50" r="46" fill="#8C2F39" stroke="#6E2229" stroke-width="2"/>
            <path d="M50 68 C 30 52, 30 34, 46 34 C 50 34, 50 40, 50 40 C 50 40, 50 34, 54 34 C 70 34, 70 52, 50 68 Z" fill="#D9B98A"/>
          </svg>
        </span>
      </span>
    </button>

    <p class="hint" id="envelopeHint">tap the envelope</p>
  </section>

</main>

<script src="script.js"></script>
<script src="pwa.js"></script>
</body>
</html>
